<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>접수 면담 챗봇</title>
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <div class="layout">
  <main class="chat">
    <header class="chat-header">
      <div class="chat-title">
        <h1>접수 면담 챗봇</h1>
        <p class="subtitle">첫 상담 전, 이야기를 정리하는 시간입니다</p>
      </div>
      <p class="turn-counter" id="turn-counter" aria-live="polite">0/10</p>
    </header>
    <ol class="stepper" id="stepper" aria-label="문진 진행 단계" hidden>
      <li class="stepper-step" data-step="1">
        <span class="stepper-circle">1</span>
        <span class="stepper-label">도움 필요 영역</span>
      </li>
      <li class="stepper-connector" aria-hidden="true"></li>
      <li class="stepper-step" data-step="2">
        <span class="stepper-circle">2</span>
        <span class="stepper-label">상황 파악</span>
      </li>
      <li class="stepper-connector" aria-hidden="true"></li>
      <li class="stepper-step" data-step="3">
        <span class="stepper-circle">3</span>
        <span class="stepper-label">상담 준비</span>
      </li>
    </ol>
    <div class="progress" aria-hidden="true">
      <div class="progress-fill" id="turn-progress"></div>
    </div>
    <details class="privacy-card">
      <summary class="privacy-summary">
        <span class="privacy-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6l7-3z"></path>
            <path d="M9 12l2 2 4-4"></path>
          </svg>
        </span>
        <span class="privacy-summary-text">첫 상담 전 접수용 안내</span>
      </summary>
      <p class="privacy-body">대화 내용은 서버에 저장됩니다. 자·타해 위험, 학대 의심, 법적 요청처럼 안전 예외가 있는 경우에는 보호자·전문기관과 공유될 수 있습니다.</p>
    </details>

    <ul class="messages" id="messages" aria-live="polite"></ul>
    <p class="status" id="status" role="alert"></p>

    <div class="chips" id="chips" hidden aria-label="빠른 선택">
      <button type="button" class="chip" data-send="요즘 마음이 자주 불안하고 걱정이 많아요.">
        <span class="chip-title">불안·걱정</span>
        <span class="chip-desc">초조하고 생각이 많아요</span>
      </button>
      <button type="button" class="chip" data-send="우울한 기분과 무기력함이 계속돼요.">
        <span class="chip-title">우울·무기력</span>
        <span class="chip-desc">기운이 없고 가라앉아요</span>
      </button>
      <button type="button" class="chip" data-send="밤에 잠을 잘 못 자고 피곤해요.">
        <span class="chip-title">수면 문제</span>
        <span class="chip-desc">잠들기 어렵거나 자주 깨요</span>
      </button>
      <button type="button" class="chip" data-send="가족이나 대인관계 때문에 힘들어요.">
        <span class="chip-title">관계 갈등</span>
        <span class="chip-desc">가족·부부·대인관계</span>
      </button>
    </div>

    <form id="chat-form" class="chat-form">
      <label for="message-input" class="sr-only">메시지 입력</label>
      <input
        id="message-input"
        name="message"
        type="text"
        autocomplete="off"
        placeholder="메시지를 입력하세요"
        required
      />
      <button type="submit" id="send-button" aria-label="전송">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"></path>
        </svg>
      </button>
    </form>
    <p class="lock-notice">
      <span class="lock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="11" width="14" height="9" rx="2"></rect>
          <path d="M8 11V7a4 4 0 018 0v4"></path>
        </svg>
      </span>
      접수 내용은 저장되며 안전 예외가 있습니다
    </p>
  </main>
  <aside class="intake-panel" id="intake-panel" aria-label="문진 진행 현황" hidden>
    <h2 class="panel-title">문진 진행</h2>
    <ul class="slot-list" id="slot-list"></ul>
    <p class="panel-hint">대화에서 확인된 항목이 자동으로 채워집니다.</p>
  </aside>
  </div>
  <script src="app.js?v=8"></script>
</body>
</html>
