<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>접수 면담 챗봇</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <main class="chat">
    <header class="chat-header">
      <div class="chat-title">
        <h1>접수 면담 챗봇</h1>
        <p class="subtitle">첫 상담 전, 이야기를 정리하는 시간입니다</p>
      </div>
      <p class="turn-counter" id="turn-counter" aria-live="polite">0/10</p>
    </header>
    <div class="progress" aria-hidden="true">
      <div class="progress-fill" id="turn-progress"></div>
    </div>
    <p class="notice">이 대화 내용은 서버에 저장됩니다.</p>

    <ul class="messages" id="messages" aria-live="polite">
      <li class="message message-assistant">안녕하세요. 접수 면담을 시작하겠습니다. 오늘 상담을 받으러 오신 이유를 편하게 말씀해 주세요.</li>
    </ul>
    <p class="status" id="status" role="alert"></p>

    <form id="chat-form" class="chat-form">
      <label for="message-input" class="sr-only">메시지 입력</label>
      <input
        id="message-input"
        name="message"
        type="text"
        autocomplete="off"
        placeholder="메시지를 입력하세요"
        required
      />
      <button type="submit" id="send-button">전송</button>
    </form>
  </main>
  <script src="app.js?v=2"></script>
</body>
</html>
