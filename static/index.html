<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LM Wiki 챗봇</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat">
    <header class="chat-header">
      <h1>LM Wiki 챗봇</h1>
      <p class="turn-counter" id="turn-counter" aria-live="polite">0/10</p>
    </header>
    <p class="notice">이 대화 내용은 서버에 저장됩니다.</p>

    <ul class="messages" id="messages" aria-live="polite"></ul>
    <p class="status" id="status" role="alert"></p>

    <form id="chat-form" class="chat-form">
      <label for="message-input" class="sr-only">메시지 입력</label>
      <input
        id="message-input"
        name="message"
        type="text"
        autocomplete="off"
        placeholder="메시지를 입력하세요"
        required
      />
      <button type="submit" id="send-button">전송</button>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
